<script>
  !function () {
    function params(u, p) {
      var m = new RegExp('(?:&|/?)' + p + '=([^&$]+)').exec(u);
      return m ? m[1] : '';
    }
     if(/iphone|android|ipod|(?=.*arkweb)(?=.*micromessenger)/i.test(navigator.userAgent) == true && params(location.search, "from") != "mobile"){
      const href = location.href;
         location.href = href.replace("/havvkrelink/","/havvkrelink/m/");
    }
  }();
