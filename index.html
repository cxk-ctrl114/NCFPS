<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCFPS · 纯文字框架</title>
    <style>
        /* 极简重置，只保留必要间距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
            padding: 2rem 1.5rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 两栏布局：左侧主内容，右侧公告 */
        .wrapper {
            display: flex;
            gap: 3rem;
            align-items: flex-start;
            margin-top: 1.5rem;
        }
        .main {
            flex: 2;
            min-width: 0; /* 防止溢出 */
        }
        .sidebar {
            flex: 1;
            max-width: 260px;
            border-left: 1px solid #ccc;
            padding-left: 2rem;
        }

        /* 左上角：logo占位 + 项目名 */
        .site-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid #aaa;
            padding-bottom: 0.75rem;
            margin-bottom: 2rem;
        }
        .logo-placeholder {
            width: 48px;
            height: 48px;
            background: #f0f0f0;
            border: 1px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #555;
            user-select: none;
        }
        .project-name {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 一级标题 + 悬停展开二级标题 */
        .title-drop {
            display: inline-block;
            position: relative;
            margin: 1.2rem 0 0.8rem 0;
            cursor: default;
        }
        .title-drop h1 {
            font-size: 2.2rem;
            font-weight: 600;
            border-bottom: 2px solid #000;
            padding-bottom: 0.2rem;
            display: inline-block;
        }
        .sub-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #ffffff;
            border: 1px solid #888;
            padding: 0.6rem 1.2rem;
            min-width: 160px;
            list-style: none;
            margin-top: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .sub-menu li {
            padding: 0.2rem 0;
            border-bottom: 1px dashed #ddd;
        }
        .sub-menu li:last-child {
            border-bottom: none;
        }
        .sub-menu a {
            text-decoration: none;
            color: #000;
        }
        .sub-menu a:hover {
            text-decoration: underline;
        }
        .title-drop:hover .sub-menu {
            display: block;
        }

        /* 首页板块占位 */
        .section-block {
            margin: 2.2rem 0;
            padding: 0.2rem 0;
            border-top: 1px solid #ccc;
        }
        .section-block h2 {
            font-weight: 500;
            font-size: 1.4rem;
            margin: 0.8rem 0 0.2rem 0;
        }
        .section-block p {
            color: #666;
            font-size: 0.95rem;
            margin: 0.2rem 0;
        }
        .placeholder-desc {
            color: #999;
            font-style: normal;
            font-size: 0.9rem;
        }

        /* 公告栏 */
        .sidebar h3 {
            font-weight: 600;
            font-size: 1.2rem;
            border-bottom: 1px solid #000;
            padding-bottom: 0.3rem;
            margin-bottom: 1rem;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .sidebar li:last-child {
            border-bottom: none;
        }
        .sidebar .date {
            font-size: 0.8rem;
            color: #777;
            display: block;
        }

        /* 分割线默认样式（hr） */
        hr {
            border: none;
            border-top: 1px solid #aaa;
            margin: 1.8rem 0;
        }

        /* 响应式 */
        @media (max-width: 720px) {
            .wrapper {
                flex-direction: column;
                gap: 2rem;
            }
            .sidebar {
                max-width: 100%;
                border-left: none;
                padding-left: 0;
                border-top: 1px solid #ccc;
                padding-top: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 左上角 Logo + 项目名 ===== -->
    <header class="site-header">
        <div class="logo-placeholder">LOGO</div>
        <span class="project-name">NCFPS</span>
    </header>

    <!-- ===== 两栏主体 ===== -->
    <div class="wrapper">

        <!-- ======== 左侧主要内容 ======== -->
        <div class="main">

            <!-- 一级标题（悬停展开二级标题） -->
            <div class="title-drop">
                <h1>NCFPS · 首页</h1>
                <ul class="sub-menu">
                    <li><a href="#">关于本站</a></li>
                    <li><a href="#">最新动态</a></li>
                    <li><a href="#">成员专区</a></li>
                    <li><a href="#">帮助文档</a></li>
                </ul>
            </div>

            <!-- 分割线 -->
            <hr />

            <!-- 首页板块：板块1（占位） -->
            <div class="section-block">
                <h2>板块一</h2>
                <p class="placeholder-desc">（此处预留内容位置）</p>
                <p> </p>
            </div>

            <!-- 分割线 -->
            <hr />

            <!-- 首页板块：板块2（占位） -->
            <div class="section-block">
                <h2>板块二</h2>
                <p class="placeholder-desc">（此处预留内容位置）</p>
                <p> </p>
            </div>

            <!-- 分割线 -->
            <hr />

            <!-- 首页板块：板块3（占位） -->
            <div class="section-block">
                <h2>板块三</h2>
                <p class="placeholder-desc">（此处预留内容位置）</p>
                <p> </p>
            </div>

            <!-- 更多板块可依此类推 -->

        </div>
        <!-- ======== 左侧 main 结束 ======== -->

        <!-- ======== 右侧公告竖列 ======== -->
        <aside class="sidebar">
            <h3>📌 公告</h3>
            <ul>
                <li>
                    <span class="date">2026-07-15</span>
                    站点框架已搭建，内容待填充。
                </li>
                <li>
                    <span class="date">2026-07-14</span>
                    欢迎访问 NCFPS 内部测试站。
                </li>
                <li>
                    <span class="date">2026-07-13</span>
                    近期将更新成员列表，敬请关注。
                </li>
                <li>
                    <span class="date">2026-07-12</span>
                    公告栏支持纯文字，无多余修饰。
                </li>
            </ul>
        </aside>

    </div>
    <!-- ===== wrapper 结束 ===== -->

    <!-- 页脚（可选） -->
    <hr style="margin-top: 3rem;" />
    <footer style="font-size: 0.8rem; color: #888; text-align: center; padding: 1rem 0;">
        &copy; 2026 NCFPS · 纯文字框架 · 保留所有位置
    </footer>

</body>
</html>
