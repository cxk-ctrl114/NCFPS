<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCFPS offical site</title>
    <style>
        /* 全局重置和字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        h1 {
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: #718096;
            margin-bottom: 25px;
        }
        .bio {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 0 10px;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .btn-outline {
            background: transparent;
            color: #667eea;
            border-color: #667eea;
        }
        .btn-outline:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #a0aec0;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        /* 响应式调整 */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
            .avatar {
                width: 90px;
                height: 90px;
                font-size: 36px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 14px;
                width: 100%;
            }
            .links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 头像区域 - 你可以改成自己的首字母或表情符号 -->
        <div class="avatar">🚀</div>
        
        <!-- 标题和简介 -->
        <h1>Test for NCFPS offical site.</h1>
        <p class="subtitle">When you see this tip, NCFPS officl site is online!</p>
        <p class="bio">
            Made by Github Pages<br>
            For NCFPS 2026.
        </p>

        <!-- 链接按钮 - 修改 href 换成你自己的地址 -->
        <div class="links">
            <a href="#" class="btn btn-primary">📝 测试1</a>
            <a href="#" class="btn btn-outline">💻 测试2</a>
            <a href="#" class="btn btn-outline">📧 测试3</a>
        </div>

        <div class="footer">
            Test for NCFPS. Powered by cxk_ctrl(Github: cxk-ctrl114).
        </div>
    </div>
</body>
</html>
